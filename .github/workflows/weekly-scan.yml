name: Daily Quant Scan

# Runs every weekday, scanning a rotating chunk of the S&P 500 (run_scan.py picks the slice
# by calendar day) so the whole index is refreshed roughly every two weeks within the FMP
# free-tier quota. Commits fresh scores + a dated history snapshot; Streamlit Cloud
# auto-redeploys, and the backtest/efficacy tools gain steady point-in-time data.

on:
  schedule:
    - cron: "0 13 * * 1-5"   # Weekdays 13:00 UTC (~9am ET / 6am PT)
  workflow_dispatch: {}        # Also lets you run it manually from the Actions tab

permissions:
  contents: write              # Needed to commit the updated CSVs back to the repo

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run quant scan
        run: python run_scan.py
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          # Optional Telegram alerts — leave unset to disable (scan runs regardless).
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit updated scores
        run: |
          git config user.name "quant-scan-bot"
          git config user.email "actions@github.com"
          git add sp500_quant_scores.csv sp500_quant_score_history.csv
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated quant scan ($(date -u +%Y-%m-%d))"
            git push
          fi
